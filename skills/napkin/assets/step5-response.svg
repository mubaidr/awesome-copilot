<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480"><defs><linearGradient id="termBg5" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#2D2B55"/><stop offset="100%" stop-color="#1E1B3A"/></linearGradient></defs><rect width="800" height="480" fill="#F8FAFB" rx="12"/><circle cx="46" cy="28" r="16" fill="#0D9488"/><text x="46" y="33" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">5</text><text x="72" y="33" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Copilot reads your napkin and responds</text><g transform="translate(40, 55)"><rect width="550" height="370" fill="#1E1B3A" stroke="#3D3A5C" stroke-width="1" rx="10"/><rect width="550" height="36" fill="#2D2B55" rx="10"/><rect width="550" height="10" x="0" y="26" fill="#2D2B55"/><circle cx="20" cy="18" r="6" fill="#FF5F57"/><circle cx="40" cy="18" r="6" fill="#FFBD2E"/><circle cx="60" cy="18" r="6" fill="#28C840"/><text x="275" y="22" fill="#8B87B0" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Terminal</text><text x="20" y="62" fill="#0D9488" font-family="monospace" font-size="13">❯</text><text x="36" y="62" fill="#E0DEF4" font-family="monospace" font-size="13">check the napkin</text><text x="20" y="88" fill="#0D9488" font-family="monospace" font-size="13">✓</text><text x="36" y="88" fill="#A5F3FC" font-family="monospace" font-size="13">Reading your napkin...</text><text x="20" y="120" fill="#C4B5FD" font-family="monospace" font-size="13">Copilot</text><text x="20" y="148" fill="#E0DEF4" font-family="monospace" font-size="12">I can see your sketch! Here&apos;s what I&apos;m picking up:</text><text x="20" y="178" fill="#E0DEF4" font-family="monospace" font-size="12">You&apos;ve drawn a three-stage workflow:</text><text x="20" y="200" fill="#A5F3FC" font-family="monospace" font-size="12">Draft</text><text x="80" y="200" fill="#64748B" font-family="monospace" font-size="12">→</text><text x="100" y="200" fill="#A5F3FC" font-family="monospace" font-size="12">Review</text><text x="165" y="200" fill="#64748B" font-family="monospace" font-size="12">→</text><text x="185" y="200" fill="#A5F3FC" font-family="monospace" font-size="12">Ship</text><text x="20" y="228" fill="#E0DEF4" font-family="monospace" font-size="12">Your sticky notes highlight some key items:</text><text x="20" y="254" fill="#FBBF24" font-family="monospace" font-size="12">■</text><text x="36" y="254" fill="#FEF3C7" font-family="monospace" font-size="12">&quot;Need legal review&quot; — before the Ship phase</text><text x="20" y="276" fill="#F472B6" font-family="monospace" font-size="12">■</text><text x="36" y="276" fill="#FCE7F3" font-family="monospace" font-size="12">&quot;Q2 deadline&quot; — June 30th</text><text x="20" y="298" fill="#60A5FA" font-family="monospace" font-size="12">■</text><text x="36" y="298" fill="#DBEAFE" font-family="monospace" font-size="12">&quot;Check with Sarah&quot; — re: compliance</text><text x="20" y="328" fill="#E0DEF4" font-family="monospace" font-size="12">It looks like you&apos;re planning a review workflow</text><text x="20" y="348" fill="#E0DEF4" font-family="monospace" font-size="12">with a legal gate. Would you like me to help you</text><text x="20" y="368" fill="#E0DEF4" font-family="monospace" font-size="12">turn this into a checklist or project plan?</text><rect width="8" height="14" x="20" y="385" fill="#0D9488" opacity=".8"/></g><g transform="translate(608, 75)"><rect width="170" height="84" fill="#0D9488" opacity=".1" rx="10"/><text x="85" y="24" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">Copilot sees your</text><text x="85" y="42" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">drawings and text,</text><text x="85" y="60" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">then responds in</text><text x="85" y="78" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">plain English</text></g><path fill="none" stroke="#0D9488" stroke-dasharray="4 3" stroke-width="1.5" d="M608,130 C598,140 596,150 594,160"/><polygon fill="#0D9488" points="590 158 594 166 598 158"/><g transform="translate(608, 190)"><rect width="170" height="230" fill="#fff" stroke="#E2E8F0" stroke-width="1" rx="10"/><text x="85" y="24" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" text-anchor="middle">What Copilot understood:</text><line x1="15" x2="155" y1="34" y2="34" stroke="#E2E8F0" stroke-width="1"/><rect width="14" height="14" x="15" y="48" fill="#F0FDFA" stroke="#0D9488" stroke-width="1" rx="2"/><text x="35" y="59" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">3-stage workflow</text><rect width="14" height="14" x="15" y="74" fill="#FEF9C3" stroke="#F59E0B" stroke-width=".8" rx="1"/><text x="35" y="85" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">Legal review needed</text><rect width="14" height="14" x="15" y="100" fill="#FCE7F3" stroke="#EC4899" stroke-width=".8" rx="2"/><text x="35" y="111" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">Q2 deadline (June 30)</text><rect width="14" height="14" x="15" y="126" fill="#DBEAFE" stroke="#3B82F6" stroke-width=".8" rx="2"/><text x="35" y="137" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">Follow up with Sarah</text><rect width="14" height="14" x="15" y="152" fill="#FEE2E2" stroke="#EF4444" stroke-width=".8" rx="7"/><text x="35" y="163" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="10">Review step = priority</text><line x1="15" x2="155" y1="180" y2="180" stroke="#E2E8F0" stroke-width="1"/><text x="85" y="200" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Everything from your</text><text x="85" y="216" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">napkin — captured!</text></g></svg>