<svg xmlns="http://www.w3.org/2000/svg" width="800" height="460" viewBox="0 0 800 460"><defs><linearGradient id="termBg" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#2D2B55"/><stop offset="100%" stop-color="#1E1B3A"/></linearGradient><linearGradient id="browserGlow" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0D9488" stop-opacity=".15"/><stop offset="100%" stop-color="#0D9488" stop-opacity=".05"/></linearGradient></defs><rect width="800" height="460" fill="#F8FAFB" rx="12"/><circle cx="46" cy="28" r="16" fill="#0D9488"/><text x="46" y="33" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1</text><text x="72" y="33" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold">Type &quot;let&apos;s napkin&quot; to start</text><g transform="translate(40, 55)"><rect width="480" height="280" fill="#1E1B3A" stroke="#3D3A5C" stroke-width="1" rx="10"/><rect width="480" height="36" fill="#2D2B55" rx="10"/><rect width="480" height="10" x="0" y="26" fill="#2D2B55"/><circle cx="20" cy="18" r="6" fill="#FF5F57"/><circle cx="40" cy="18" r="6" fill="#FFBD2E"/><circle cx="60" cy="18" r="6" fill="#28C840"/><text x="240" y="22" fill="#8B87B0" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle">Terminal</text><text x="20" y="68" fill="#8B87B0" font-family="monospace" font-size="13">~/Projects</text><text x="115" y="68" fill="#6C6A8A" font-family="monospace" font-size="13">$</text><text x="130" y="68" fill="#E0DEF4" font-family="monospace" font-size="13">copilot</text><text x="20" y="100" fill="#0D9488" font-family="monospace" font-size="13">❯</text><text x="36" y="100" fill="#E0DEF4" font-family="monospace" font-size="13">let&apos;s napkin</text><text x="20" y="140" fill="#0D9488" font-family="monospace" font-size="13">✓</text><text x="36" y="140" fill="#A5F3FC" font-family="monospace" font-size="13">Opening your napkin whiteboard...</text><text x="20" y="172" fill="#C4B5FD" font-family="monospace" font-size="13">Copilot</text><text x="20" y="196" fill="#E0DEF4" font-family="monospace" font-size="13">Your napkin is open in your browser!</text><text x="20" y="218" fill="#E0DEF4" font-family="monospace" font-size="13">Sketch your ideas, then click</text><text x="20" y="240" fill="#34D399" font-family="monospace" font-size="13">&quot;Share with Copilot&quot;</text><text x="215" y="240" fill="#E0DEF4" font-family="monospace" font-size="13">when ready.</text><rect width="8" height="14" x="20" y="260" fill="#0D9488" opacity=".8"/></g><g transform="translate(560, 100)"><rect width="200" height="160" fill="#fff" stroke="#D1D5DB" stroke-width="1.5" rx="8"/><rect width="200" height="28" fill="#F1F5F9" rx="8"/><rect width="200" height="8" x="0" y="20" fill="#F1F5F9"/><circle cx="14" cy="14" r="4" fill="#E2E8F0"/><circle cx="28" cy="14" r="4" fill="#E2E8F0"/><circle cx="42" cy="14" r="4" fill="#E2E8F0"/><rect width="132" height="14" x="56" y="7" fill="#fff" stroke="#E2E8F0" stroke-width="1" rx="3"/><text x="72" y="17" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="7">napkin.html</text><rect width="180" height="110" x="10" y="38" fill="#FAFAFA" rx="3"/><rect width="120" height="14" x="40" y="44" fill="#F1F5F9" stroke="#E2E8F0" stroke-width=".5" rx="3"/><rect width="50" height="12" x="130" y="130" fill="#0D9488" rx="3"/><text x="155" y="139" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="5" text-anchor="middle">Share</text><circle cx="50" cy="80" r="1" fill="#E2E8F0"/><circle cx="80" cy="80" r="1" fill="#E2E8F0"/><circle cx="110" cy="80" r="1" fill="#E2E8F0"/><circle cx="140" cy="80" r="1" fill="#E2E8F0"/><circle cx="50" cy="105" r="1" fill="#E2E8F0"/><circle cx="80" cy="105" r="1" fill="#E2E8F0"/><circle cx="110" cy="105" r="1" fill="#E2E8F0"/><circle cx="140" cy="105" r="1" fill="#E2E8F0"/></g><path fill="none" stroke="#0D9488" stroke-dasharray="6 4" stroke-width="2.5" d="M525,200 C555,180 555,160 570,150"/><polygon fill="#0D9488" points="568 144 576 150 568 156"/><rect width="190" height="36" x="530" y="270" fill="#0D9488" opacity=".1" rx="6"/><text x="625" y="285" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Browser opens</text><text x="625" y="300" fill="#0D9488" font-family="Arial, Helvetica, sans-serif" font-size="11" text-anchor="middle">automatically</text><rect width="720" height="70" x="40" y="365" fill="#fff" stroke="#E2E8F0" stroke-width="1" rx="8"/><text x="60" y="393" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="bold">How it works:</text><text x="60" y="418" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="12">Type &quot;let&apos;s napkin&quot; (or &quot;open the napkin&quot;) in your Copilot CLI session.</text><text x="60" y="436" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="12">A whiteboard will open in your default browser — no setup needed.</text></svg>